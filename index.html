<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiola — Chat in Every Language</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #1C1C1E;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            text-align: center;
        }
        .logo {
            font-size: 64px;
            font-weight: 900;
            margin-bottom: 12px;
        }
        .hi { color: #00B894; }
        .la { color: #0099E6; }
        .o {
            display: inline-block;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #00B894;
            position: relative;
            top: 4px;
            margin: 0 2px;
        }
        .o::after {
            content: '';
            display: block;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #FFFFFF;
            position: absolute;
            top: 9px;
            left: 9px;
        }
        .tagline {
            font-size: 20px;
            color: #8E8E93;
            margin-bottom: 40px;
        }
        .links a {
            display: inline-block;
            color: #00B894;
            text-decoration: none;
            font-size: 16px;
            margin: 0 16px;
            padding: 8px 0;
        }
        .links a:hover { text-decoration: underline; }
        .footer {
            margin-top: 60px;
            font-size: 13px;
            color: #C7C7CC;
        }
    </style>
</head>
<body>
    <div class="logo">
        <span class="hi">Hi</span><span class="o"></span><span class="la">la</span>
    </div>
    <p class="tagline">Chat in Every Language</p>
    <div class="links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms of Service</a>
    </div>
    <p class="footer">&copy; 2026 Elena Zobak LLC</p>
</body>
</html>
